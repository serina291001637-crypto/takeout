<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>テイクアウト注文</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    body {
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      width: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      overflow: auto;
    }

    #loading {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e5e5e5;
      border-top: 4px solid #d94a38;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @supports not (height: 100dvh) {
      #app,
      #loading {
        height: 100vh;
      }
    }
  </style>
</head>

<body>

  <div id="loading">
    <div class="spinner"></div>
    読み込み中...
  </div>

  <iframe
    id="app"
    allow="camera *; microphone *"
    loading="eager">
  </iframe>

  <script>

    // ↓↓↓自分のGAS URLに変更↓↓↓

    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbyA22s94rwtTexzMXpDceB1rvJOUD9IIZCbKIZmIfOtVVUewwxcOmLcWH85QDlO8zQL/exec";

    // ↑↑↑ここだけ変更↑↑↑

    const iframe = document.getElementById("app");

    iframe.src = GAS_URL + location.search;

    iframe.onload = function () {
      document.getElementById("loading").style.display = "none";
    };

    iframe.onerror = function () {
      document.getElementById("loading").innerHTML =
        "読み込みに失敗しました。<br>再度お試しください。";
    };

  </script>

</body>
</html>
